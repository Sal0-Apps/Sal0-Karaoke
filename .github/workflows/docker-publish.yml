name: Build, Publish and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # Dispara quando tags começando com v são criadas, ex: v1.0

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requerido para criar Releases do GitHub
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository name
        run: |
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=$IMAGE_LOWER" >> $GITHUB_ENV

      - name: Set up tag version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Extrair versão limpa da tag (ex: v1.0 -> 1.0)
            VERSION_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
            echo "IS_TAG=true" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=latest" >> $GITHUB_ENV
            echo "IS_TAG=false" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          # Se for uma tag, publica tanto a tag da versão quanto latest. Caso contrário, apenas latest.
          tags: |
            ${{ env.IMAGE_TAG }}:latest
            ${{ env.IS_TAG == 'true' && format('{0}:{1}', env.IMAGE_TAG, env.VERSION_TAG) || '' }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Sal0 Karaoke v${{ env.VERSION_TAG }}
          body: |
            ## 🚀 Sal0 Karaoke v${{ env.VERSION_TAG }}

            Gerador local de vídeos de karaokê com Demucs, Faster-Whisper, FFmpeg e sincronização de legendas ASS.

            ### ✨ Destaques da versão 5.0.0
            * Pipeline local para separação vocal, VAD opcional, transcrição, alinhamento e renderização.
            * Entrada por upload, biblioteca ou YouTube; fundos por vídeo original, imagem/vídeo, biblioteca, paisagem e cor sólida.
            * Modos de legenda por sílaba/varredura, palavra e linha, com fontes, cores, posição, quebra e perfis personalizáveis.
            * Letra manual ou automática na tela básica, com prioridade manual, revisão local e cache persistente.
            * Busca resiliente em LRCLIB, Lyrics.ovh e Musixmatch; somente título/artista sai do ambiente local, nunca áudio ou vídeo.
            * Autenticação local, usuários, histórico, editor de correção, Telegram opcional e compatibilidade com Docker/CasaOS.

            ### 🐋 Como executar esta versão:
            No seu `docker-compose.yml`, você pode travar a versão alterando a linha da imagem para:
            ```yaml
            image: ${{ env.IMAGE_TAG }}:${{ env.VERSION_TAG }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
