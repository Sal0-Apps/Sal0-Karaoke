name: Build, Publish and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Dispara quando tags começando com v são criadas, ex: v1.0

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requerido para criar Releases do GitHub
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate subtitle and easy-mode rules
        run: python -m unittest discover -s tests -v

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository name
        run: |
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=$IMAGE_LOWER" >> $GITHUB_ENV

      - name: Set up tag version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Extrair versão limpa da tag (ex: v1.0 -> 1.0)
            VERSION_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
            echo "IS_TAG=true" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=latest" >> $GITHUB_ENV
            echo "IS_TAG=false" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          # Se for uma tag, publica tanto a tag da versão quanto latest. Caso contrário, apenas latest.
          tags: |
            ${{ env.IMAGE_TAG }}:latest
            ${{ env.IS_TAG == 'true' && format('{0}:{1}', env.IMAGE_TAG, env.VERSION_TAG) || '' }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Sal0 Karaoke v${{ env.VERSION_TAG }}
          body: |
            ## 🚀 Sal0 Karaoke v${{ env.VERSION_TAG }}

            O Modo Fácil agora é simples para quem usa e completo para quem administra.

            ### ✨ Nesta versão
            * **Modo Completo** é a primeira aba do administrador; **Modo Fácil** é a primeira aba dos usuários comuns.
            * O administrador pode definir todas as opções técnicas do Modo Fácil em um perfil global organizado por seções.
            * Os padrões atuais — Large V3 Turbo, Voz difícil, fonte 50 e áudio original — foram preservados.
            * Nova tela guiada com identidade visual completa, etapas claras, ícones e resumo do perfil aplicado.
            * Música e fundo continuam aceitando upload, Biblioteca e YouTube sem expor configurações técnicas ao usuário comum.

            ### 🐋 Como executar esta versão:
            No seu `docker-compose.yml`, você pode travar a versão alterando a linha da imagem para:
            ```yaml
            image: ${{ env.IMAGE_TAG }}:${{ env.VERSION_TAG }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
