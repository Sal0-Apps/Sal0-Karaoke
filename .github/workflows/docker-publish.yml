name: Build, Publish and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Dispara quando tags começando com v são criadas, ex: v1.0

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requerido para criar Releases do GitHub
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate subtitle and easy-mode rules
        run: python -m unittest discover -s tests -v

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository name
        run: |
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=$IMAGE_LOWER" >> $GITHUB_ENV

      - name: Set up tag version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Extrair versão limpa da tag (ex: v1.0 -> 1.0)
            VERSION_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
            echo "IS_TAG=true" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=latest" >> $GITHUB_ENV
            echo "IS_TAG=false" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          # Se for uma tag, publica tanto a tag da versão quanto latest. Caso contrário, apenas latest.
          tags: |
            ${{ env.IMAGE_TAG }}:latest
            ${{ env.IS_TAG == 'true' && format('{0}:{1}', env.IMAGE_TAG, env.VERSION_TAG) || '' }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Sal0 Karaoke v${{ env.VERSION_TAG }}
          body: |
            ## 🚀 Sal0 Karaoke v${{ env.VERSION_TAG }}

            Uma versão para quem quer criar com um clique — e para quem quer continuar ajustando cada detalhe.

            ### ✨ Nesta versão
            * Novo **Modo Fácil**: escolha a música, um fundo opcional e deixe o restante com o aplicativo.
            * Padrão inicial com Large V3 Turbo, letra 50 e perfil Voz difícil, configurável pelo administrador para todas as contas.
            * Busca automática de letra sem bloquear o processo quando nenhuma fonte responde.
            * Fundos por upload, Biblioteca ou YouTube; sem escolha, o vídeo original é usado automaticamente.
            * Versos mais naturais, guiados pelas linhas da letra, pausas e pontuação — sem cortes arbitrários do Whisper.
            * A legenda atual permanece visível até a próxima entrar, sem sumir entre dois versos.

            ### 🐋 Como executar esta versão:
            No seu `docker-compose.yml`, você pode travar a versão alterando a linha da imagem para:
            ```yaml
            image: ${{ env.IMAGE_TAG }}:${{ env.VERSION_TAG }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
