name: Build, Publish and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Dispara quando tags começando com v são criadas, ex: v1.0

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requerido para criar Releases do GitHub
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository name
        run: |
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=$IMAGE_LOWER" >> $GITHUB_ENV

      - name: Set up tag version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Extrair versão limpa da tag (ex: v1.0 -> 1.0)
            VERSION_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
            echo "IS_TAG=true" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=latest" >> $GITHUB_ENV
            echo "IS_TAG=false" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          # Se for uma tag, publica tanto a tag da versão quanto latest. Caso contrário, apenas latest.
          tags: |
            ${{ env.IMAGE_TAG }}:latest
            ${{ env.IS_TAG == 'true' && format('{0}:{1}', env.IMAGE_TAG, env.VERSION_TAG) || '' }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Sal0 Karaoke v${{ env.VERSION_TAG }}
          body: |
            ## 🚀 Sal0 Karaoke v${{ env.VERSION_TAG }}

            Uma atualização de acabamento para deixar a criação mais clara, previsível e agradável em telas grandes e pequenas.

            ### ✨ Nesta versão
            * Progresso do Demucs agregado entre as quatro análises, sem barras presas ou percentuais voltando para trás.
            * Ajustes reorganizados no desktop e cabeçalhos redundantes removidos das abas.
            * Player da Biblioteca com avanço, retorno e streaming por intervalos.
            * Prévia da legenda ligada à estrofe selecionada, com navegação e tempos visíveis.
            * Letra automática renovada ao trocar de música, inclusive com identificação prévia de links do YouTube.
            * Proteção no servidor para nunca reaproveitar a letra automática de outra faixa.

            ### 🐋 Como executar esta versão:
            No seu `docker-compose.yml`, você pode travar a versão alterando a linha da imagem para:
            ```yaml
            image: ${{ env.IMAGE_TAG }}:${{ env.VERSION_TAG }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
